<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Jungle Survival - Hard Mode</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
      #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
      #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
      #stats { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px black; }
      #health-container { width: 200px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid white; margin-top: 5px; }
      #health-bar { width: 100%; height: 100%; background: #ff0000; transition: width 0.2s; }
      #minimap { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; background: rgba(0,50,0,0.6); border: 3px solid #333; border-radius: 50%; overflow: hidden; }
      .enemy-dot { position: absolute; width: 6px; height: 6px; background: red; border-radius: 50%; transform: translate(-50%, -50%); }
      #player-dot { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
      #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px rgba(255,0,0,0); transition: box-shadow 0.1s; pointer-events: none; }
      .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: all; z-index: 100; }
      button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #c00; color: white; border: none; margin-top: 20px; }
      #game-over { display: none; }
    </style>
  </head>
  <body>

    <div id="ui">
        <div id="vignette"></div>
        <div id="crosshair"></div>
        <div id="stats">
            <div>SCORE: <span id="score-val">0</span></div>
            <div>HEALTH</div>
            <div id="health-container"><div id="health-bar"></div></div>
        </div>
        <div id="minimap">
            <div id="player-dot"></div>
            <div id="enemy-dots"></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1>JUNGLE SURVIVAL: HARD MODE</h1>
        <p>Use WASD or Arrows to Move. Left-Click to Shoot.</p>
        <p>Enemies deal massive damage. Survive.</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game-over" class="screen">
        <h1>YOU DIED</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <a-scene physics="debug: false" renderer="antialias: true" pointer-lock-container>
      
      <a-assets>
        <a-mixin id="cube" geometry="primitive: box"></a-mixin>
      </a-assets>

      <a-entity environment="preset: forest; 
                              seed: 42; 
                              dressing: trees; 
                              dressingAmount: 100; 
                              groundColor: #223311; 
                              grid: none; 
                              lighting: distant; 
                              fog: 0;"></a-entity>

      <a-cone position="30 0 -40" radius-bottom="15" height="30" color="#444" material="roughness: 1"></a-cone>
      <a-cone position="-40 0 -20" radius-bottom="20" height="40" color="#333" material="roughness: 1"></a-cone>
      
      <a-box position="5 0.5 -5" color="#5a3a22" material="roughness: 0.8"></a-box>
      <a-box position="-3 0.5 -8" color="#5a3a22" material="roughness: 0.8"></a-box>
      
      <a-entity position="15 0 -15">
          <a-box position="0 2 0" width="6" height="4" depth="6" color="#8b4513"></a-box>
          <a-cone position="0 5 0" radius-bottom="5" height="3" color="#3e2723" segments-radial="4" rotation="0 45 0"></a-cone>
      </a-entity>

      <a-entity id="rig" position="0 0 0" movement-controls="speed: 0.3">
        <a-entity id="camera" camera position="0 1.6 0" look-controls>
          <a-entity id="gun" position="0.35 -0.3 -0.5">
            <a-box width="0.1" height="0.15" depth="0.5" color="#222"></a-box>
            <a-box width="0.08" height="0.3" depth="0.1" position="0 -0.15 0.2" color="#111"></a-box>
            <a-light id="muzzle-flash" type="point" intensity="0" distance="2" color="yellow" position="0 0 -0.3"></a-light>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="enemy-container"></a-entity>

    </a-scene>

    <script>
      let score = 0;
      let health = 100;
      let gameActive = false;
      const enemyContainer = document.querySelector('#enemy-container');
      const healthBar = document.querySelector('#health-bar');
      const scoreVal = document.querySelector('#score-val');
      const vignette = document.querySelector('#vignette');
      const enemyDots = document.querySelector('#enemy-dots');

      // Gameplay Settings
      const ENEMY_DAMAGE = 35; // Hard Mode: 3 hits and you're out
      const SPAWN_RATE = 2000;

      function startGame() {
          document.querySelector('#start-screen').style.display = 'none';
          gameActive = true;
          spawnEnemy();
          setInterval(spawnEnemy, SPAWN_RATE);
          animate();
      }

      // Shooting Logic
      window.addEventListener('mousedown', (e) => {
          if(!gameActive || e.button !== 0) return;

          // Recoil
          const gun = document.querySelector('#gun');
          gun.setAttribute('animation', "property: position; to: 0.35 -0.3 -0.4; dur: 50; dir: alternate; loop: 1");
          
          // Flash
          const flash = document.querySelector('#muzzle-flash');
          flash.setAttribute('intensity', 2);
          setTimeout(() => flash.setAttribute('intensity', 0), 50);

          // Raycasting for hits
          const cam = document.querySelector('#camera');
          const direction = new THREE.Vector3(0, 0, -1);
          direction.applyQuaternion(cam.object3D.quaternion);
          
          const raycaster = new THREE.Raycaster(cam.object3D.position, direction);
          const intersects = raycaster.intersectObjects(enemyContainer.object3D.children, true);

          if (intersects.length > 0) {
              const hitObject = intersects[0].object.el;
              if (hitObject.classList.contains('enemy')) {
                  killEnemy(hitObject);
              }
          }
      });

      function spawnEnemy() {
          if(!gameActive) return;
          const enemy = document.createElement('a-entity');
          const angle = Math.random() * Math.PI * 2;
          const dist = 20 + Math.random() * 10;
          const x = Math.cos(angle) * dist;
          const z = Math.sin(angle) * dist;

          enemy.setAttribute('geometry', 'primitive: box; width: 0.8; height: 1.8; depth: 0.8');
          enemy.setAttribute('material', 'color: red; emissive: #300');
          enemy.setAttribute('position', `${x} 0.9 ${z}`);
          enemy.classList.add('enemy');
          
          // Brains
          enemy.setAttribute('enemy-logic', '');
          enemyContainer.appendChild(enemy);
      }

      function killEnemy(el) {
          score += 100;
          scoreVal.innerText = score;
          el.parentNode.removeChild(el);
      }

      function takeDamage() {
          health -= ENEMY_DAMAGE;
          healthBar.style.width = health + '%';
          vignette.style.boxShadow = 'inset 0 0 100px rgba(255,0,0,1)';
          setTimeout(() => { vignette.style.boxShadow = 'inset 0 0 100px rgba(255,0,0,0)'; }, 200);

          if (health <= 0) {
              gameActive = false;
              document.querySelector('#game-over').style.display = 'flex';
              document.querySelector('#final-score').innerText = score;
          }
      }

      // Enemy AI Component
      AFRAME.registerComponent('enemy-logic', {
          tick: function (time, timeDelta) {
              if(!gameActive) return;
              const playerPos = document.querySelector('#rig').object3D.position;
              const enemyPos = this.el.object3D.position;
              
              // Move towards player
              const dir = new THREE.Vector3().subVectors(playerPos, enemyPos).normalize();
              enemyPos.x += dir.x * 0.05;
              enemyPos.z += dir.z * 0.05;

              // Check collision with player
              const dist = enemyPos.distanceTo(playerPos);
              if (dist < 1.5) {
                  takeDamage();
                  this.el.parentNode.removeChild(this.el);
              }
          }
      });

      // Mini-map & General Loop
      function animate() {
          if(!gameActive) return;
          
          const playerPos = document.querySelector('#rig').object3D.position;
          enemyDots.innerHTML = '';
          
          const enemies = document.querySelectorAll('.enemy');
          enemies.forEach(en => {
              const pos = en.object3D.position;
              const dot = document.createElement('div');
              dot.className = 'enemy-dot';
              
              // Relative position for radar
              const dx = (pos.x - playerPos.x) * 2;
              const dz = (pos.z - playerPos.z) * 2;
              
              dot.style.left = (75 + dx) + 'px';
              dot.style.top = (75 + dz) + 'px';
              enemyDots.appendChild(dot);
          });

          requestAnimationFrame(animate);
      }

      // A-Frame Movement mapping (WASD + Arrows)
      // Standard WASD is built-in, adding Arrow support via key listener
      window.addEventListener('keydown', e => {
          const rig = document.querySelector('#rig');
          const rot = rig.getAttribute('rotation');
      });

    </script>
  </body>
        </html>
